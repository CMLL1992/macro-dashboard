name: Daily Macro Jobs

on:
  schedule:
    - cron: "0 6 * * 1-5"   # 06:00 UTC (ajusta a tu zona)
    - cron: "15 6 * * 1-5"  # 06:15 UTC
  workflow_dispatch: {}

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Ingest FRED
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $CRON_TOKEN" \
            "${APP_URL}/api/jobs/ingest/fred"
        env:
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
          APP_URL: ${{ secrets.APP_URL }}

      - name: Correlations
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $CRON_TOKEN" \
            "${APP_URL}/api/jobs/correlations"
        env:
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
          APP_URL: ${{ secrets.APP_URL }}

      - name: Compute Bias
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $CRON_TOKEN" \
            "${APP_URL}/api/jobs/compute/bias"
        env:
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
          APP_URL: ${{ secrets.APP_URL }}

  maintenance:
    runs-on: ubuntu-latest
    schedule:
      # Este job se ejecutará semanalmente los domingos a las 02:00 UTC
      # (nota: 'schedule' de jobs no es soportado por GitHub; mantenemos una sola lista global arriba
      # Si quieres un horario distinto, crea otro workflow o usa lógica de fecha en el paso)
    steps:
      - name: Maintenance
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $CRON_TOKEN" \
            "${APP_URL}/api/jobs/maintenance"
        env:
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
          APP_URL: ${{ secrets.APP_URL }}


