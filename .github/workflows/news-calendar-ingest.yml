name: News & Calendar Ingest

# Pipeline automático para ingerir noticias y eventos del calendario económico
# Se ejecuta automáticamente cada 6 horas y puede ejecutarse manualmente

on:
  schedule:
    # Ejecutar cada 6 horas para verificar nuevas noticias y eventos
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  ingest-news:
    name: Ingest News from RSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run news ingestion script
        run: |
          echo "🔄 Ingestando noticias desde RSS feeds..."
          pnpm tsx scripts/ingest-news-rss.ts
        env:
          APP_URL: ${{ secrets.APP_URL }}
          INGEST_KEY: ${{ secrets.INGEST_KEY }}

      - name: Report results
        if: always()
        run: |
          echo "✅ News ingestion job completed"

  ingest-calendar:
    name: Ingest Calendar from FRED
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run calendar ingestion script
        run: |
          echo "🔄 Ingestando eventos del calendario desde FRED..."
          pnpm tsx scripts/ingest-calendar-fred.ts
        env:
          APP_URL: ${{ secrets.APP_URL }}
          INGEST_KEY: ${{ secrets.INGEST_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Report results
        if: always()
        run: |
          echo "✅ Calendar ingestion job completed"
